name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Shallow clones can turn the pushed annotated tag into a local
          # lightweight ref, in which case %(contents) below silently
          # returns the commit message instead of the tag's own message.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build plugin
        run: |
          npm ci
          npm run build

      - name: Check tag matches manifest version
        run: |
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          TAG="${GITHUB_REF#refs/tags/}"
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "Tag $TAG does not match manifest version $MANIFEST_VERSION" >&2
            exit 1
          fi

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          NOTES="$(git tag -l --format='%(contents)' "$TAG")"
          if [ -z "$NOTES" ]; then
            echo "Tag $TAG has no annotated message to use as release notes." >&2
            echo "Create it with: git tag -a $TAG -m '<summary of what changed and why>'" >&2
            exit 1
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$NOTES" \
            main.js manifest.json styles.css
