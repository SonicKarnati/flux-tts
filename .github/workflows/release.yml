name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build plugin
        run: |
          npm ci
          npm run build

      - name: Check tag matches manifest version
        run: |
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          TAG="${GITHUB_REF#refs/tags/}"
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "Tag $TAG does not match manifest version $MANIFEST_VERSION" >&2
            exit 1
          fi

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "$TAG" \
            --draft \
            main.js manifest.json versions.json styles.css
